<script type="module">
  document.addEventListener('DOMContentLoaded', () => {
    // DOM要素の取得
    const menuBtn = document.getElementById('menuBtn');
    const navDrawer = document.getElementById('navDrawer');
    const scrim = document.getElementById('scrim');
    const themeToggleItem = document.getElementById('themeToggleItem');
    const themeIcon = document.getElementById('themeIcon');
    const navLinks = document.querySelectorAll('.nav-link');
    const root = document.documentElement;

    // ドロワーの開閉制御
    const openDrawer = () => {
      if (navDrawer) {
        navDrawer.opened = true;
        if (scrim) scrim.classList.add('show');
      }
    };

    const closeDrawer = () => {
      if (navDrawer) {
        navDrawer.opened = false;
        if (scrim) scrim.classList.remove('show');
      }
    };

    // メニューボタンのクリックイベント
    if (menuBtn) {
      menuBtn.addEventListener('click', (e) => {
        e.stopPropagation();
        openDrawer();
      });
    }

    // スクリムのクリックイベント
    if (scrim) {
      scrim.addEventListener('click', closeDrawer);
    }

    // ナビゲーションリンクのクリックイベント
    navLinks.forEach(link => {
      link.addEventListener('click', closeDrawer);
    });

    // ダークモード管理
    const updateThemeUI = (isDark) => {
      if (isDark) {
        root.classList.add('dark-mode');
        if (themeToggleItem) themeToggleItem.label = 'ライトモードにする';
        if (themeIcon) themeIcon.textContent = 'light_mode';
      } else {
        root.classList.remove('dark-mode');
        if (themeToggleItem) themeToggleItem.label = 'ダークモードにする';
        if (themeIcon) themeIcon.textContent = 'dark_mode';
      }
    };

    // 初期テーマの設定
    const savedTheme = localStorage.getItem('pbhub-theme');
    const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
    const isDarkMode = savedTheme === 'dark' || (!savedTheme && prefersDark);
    updateThemeUI(isDarkMode);

    // テーマ切り替えボタンのクリックイベント
    if (themeToggleItem) {
      themeToggleItem.addEventListener('click', (e) => {
        e.preventDefault();
        const nextDark = !root.classList.contains('dark-mode');
        updateThemeUI(nextDark);
        localStorage.setItem('pbhub-theme', nextDark ? 'dark' : 'light');
      });
    }
  });
</script>
