<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Polandballhub</title>

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet">

    <style>
        :root {
            --accent-primary: #3381FF;
            --accent-active: #1A5FCC;
            --bg-base: #F7F7F7;
            --glass-bg: #FFFFFF;
            --text-main: #000000;
            --text-sub: #555555;
            --bg-secondary: #EEEEEE;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Plus Jakarta Sans', 'Noto Sans JP', sans-serif;
            background-color: var(--bg-base);
            color: var(--text-main);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* --- Layout --- */
        main {
            padding: 20px;
            width: 100%;
            max-width: 450px;
            text-align: center;
        }

        /* --- UI Components --- */
        .glass-card {
            background: var(--glass-bg);
            border-radius: 24px;
            padding: 40px;
            box-shadow: none !important;
            border: none !important;
        }

        h2 { 
            font-size: 24px; 
            margin-top: 20px; 
            margin-bottom: 12px; 
            font-weight: 700; 
        }
        
        p {
            font-size: 15px;
            line-height: 1.6;
            margin-top: 0;
            margin-bottom: 24px;
            color: var(--text-sub);
        }

        .ai-btn {
            border: none; outline: none;
            padding: 14px 28px; border-radius: 14px;
            font-weight: 600; font-size: 15px;
            color: white; cursor: pointer;
            background: var(--accent-primary);
            text-decoration: none;
            display: inline-flex; align-items: center; gap: 8px;
            transition: transform 0.2s, background-color 0.2s;
        }
        
        .ai-btn:hover { transform: scale(1.02); }
        .ai-btn:active { background: var(--accent-active); transform: scale(0.95); }

        .char-image {
            width: 160px;
            height: 160px;
            object-fit: contain;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>

    <main>
        <div class="glass-card">
            <!-- キャラクター画像 -->
            <img src="https://raw.githubusercontent.com/PolandBallHub-Operator/pbimagesPublic/refs/heads/main/newballs/germany/frontplot.png" 
                 alt="Polandball" class="char-image">
            
            <h2>404 Not Found</h2>
            <p>
                「Polandballhub」は「Polandballpark」に変わったんよ。<br>
                以下のリンクから移動してほしいんよ。
            </p>
            
            <a href="https://polandballhub-operator.github.io/pbpark" class="ai-btn">
                Polandballparkへ移動する
                <span class="material-symbols-outlined">arrow_forward</span>
            </a>
        </div>
    </main>

</body>
</html>
